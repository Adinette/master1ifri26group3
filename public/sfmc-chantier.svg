  <line x1="555" y1="30" x2="560" y2="24" stroke="#FCD34D" stroke-width="3" stroke-linecap="round"/>
  <line x1="569" y1="55" x2="575" y2="55" stroke="#FCD34D" stroke-width="3" stroke-linecap="round"/>
  <line x1="555" y1="80" x2="560" y2="86" stroke="#FCD34D" stroke-width="3" stroke-linecap="round"/>
  <line x1="505" y1="30" x2="500" y2="24" stroke="#FCD34D" stroke-width="3" stroke-linecap="round"/>
  <line x1="491" y1="55" x2="485" y2="55" stroke="#FCD34D" stroke-width="3" stroke-linecap="round"/>
  <line x1="505" y1="80" x2="500" y2="86" stroke="#FCD34D" stroke-width="3" stroke-linecap="round"/>

